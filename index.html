<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINK ALL APK/FILE</title>
    <!-- Google Fonts & Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- CSS External -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Page -->
    <div class="login-container" id="loginContainer">
        <h2>Selamat Datang</h2>
        <input type="text" id="username" placeholder="Username" autocomplete="off">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Masuk</button>
        <div class="error-message" id="errorMsg"></div>
    </div>

    <!-- Main App -->
    <div class="main-app" id="mainApp">
        <div class="header">
            <div class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </div>
            <h1>Dashboard ADMIN</h1>
            <div class="user-info" id="userInfo"></div>
        </div>

        <!-- Grid Cards -->
        <div class="cards-grid" id="cardsGrid"></div>
    </div>

    <!-- Sidebar (Admin Only) -->
    <div class="sidebar" id="sidebar">
        <h3>Menu Admin</h3>
        <div class="form-group">
            <label for="cardTitle">Judul / Teks</label>
            <input type="text" id="cardTitle" placeholder="................">
        </div>
        <div class="form-group">
            <label for="cardUrl">URL (opsional)</label>
            <input type="url" id="cardUrl" placeholder="https://contoh.com">
        </div>
        <button id="addCardBtn">Tambah</button>
        <button class="cancel-btn" id="cancelEditBtn" style="display: none;">Batal</button>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>

    <!-- JavaScript External -->
    <script src="script.js" defer></script>
</body>
</html>
